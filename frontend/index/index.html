    <style>
        /* 完全1:1の雰囲気を保つため、ベースはあくまで自然体。画像のテイストを再現 */
        body {
            background-color: #f6f7f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .card-shadow {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 20, 40, 0.05);
        }

        .separator-dash {
            border-top: 2px dashed #d0d5dd;
            opacity: 0.5;
            width: 100%;
            margin: 1.5rem 0;
        }

        /* 画像内の丸要素・装飾を再現する簡易スタイル */
        .badge-neutral {
            background-color: #eef2f6;
            color: #1e293b;
            font-weight: 500;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-block;
        }

        .matrix-tag {
            background: white;
            border-radius: 40px;
            padding: 0.2rem 0.9rem;
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
        }

        /* ===== 固定フッターボタン ===== */
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.98) 60%, rgba(255, 255, 255, 0.9) 100%);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(100, 116, 139, 0.15);
            padding: 0.85rem 1.5rem 1.2rem 1.5rem;
            box-shadow: 0 -8px 25px rgba(0, 10, 30, 0.03);
            z-index: 50;
            text-align: center;
        }

        .cta-button {
            background: linear-gradient(115deg, #1f2a3f, #28344e);
            color: white;
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: 0.03em;
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 60px;
            box-shadow: 0 12px 24px -10px rgba(20, 40, 70, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .cta-button:hover {
            background: linear-gradient(115deg, #25324b, #2e3c5a);
            transform: scale(1.02);
            box-shadow: 0 16px 28px -8px #101b2e75;
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        /* コンテンツがボタンに隠れないように bottom パディング */
        .spacer-for-fixed-bottom {
            padding-bottom: 95px;
        }

        /* 既存のmainカードに少し手を加える (最大幅はそのまま) */
        main {
            transition: all 0.2s;
        }

        /* カスタムスクロールバー */
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>

            renderHero();

        function renderHero() {
            const heroContainer = document.createElement('div');
            heroContainer.className = 'px-6 pb-2 border-b border-gray-100';

            const title = document.createElement('h1');
            title.className = 'text-2xl font-semibold tracking-tight text-gray-800';
            title.textContent = window.__COPY.hero_title;

            const tagsContainer = document.createElement('div');
            tagsContainer.className = 'flex flex-wrap items-center gap-2 mt-1';

            window.__COPY.tags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'badge-neutral';
                tagElement.textContent = tag;
                tagsContainer.appendChild(tagElement);
            });

            const separator = document.createElement('div');
            separator.className = 'separator-dash mt-4';

            heroContainer.appendChild(title);
            heroContainer.appendChild(tagsContainer);
            heroContainer.appendChild(separator);

            // コンプライアンスバナーのレンダリング
            const complianceBanner = document.createElement('section');
            complianceBanner.className = 'bg-amber-50/70 p-4 rounded-2xl border border-amber-100 mt-4';

            bannerTitle.innerHTML = '<span>⚠️</span> ' + window.__COPY.compliance_banner.title;

            const bannerItems = document.createElement('ul');
            bannerItems.className = 'list-disc list-outside text-xs text-amber-800/90 space-y-1.5 pl-5';

            window.__COPY.compliance_banner.items.forEach(item => {
                const listItem = document.createElement('li');
                listItem.textContent = item;
                bannerItems.appendChild(listItem);
            });

            complianceBanner.appendChild(bannerTitle);
            complianceBanner.appendChild(bannerItems);

            heroContainer.appendChild(complianceBanner);

            // ヒーローセクションを本文に追加
            const bodyContainer = document.getElementById('__body');
            bodyContainer.insertBefore(heroContainer, bodyContainer.firstChild);
        }

        // セクションのレンダリング
        function renderSections() {
            const bodyContainer = document.getElementById('__body');

            window.__LAYOUT.sections.forEach(sectionId => {
                const sectionData = window.__COPY.sections.find(section => section.id === sectionId);
                if (!sectionData) return;

                const section = document.createElement('section');
                section.id = sectionId;
                section.className = 'mt-6';

                // セクションタイトル
                const title = document.createElement('h2');
                title.className = 'text-lg font-medium text-gray-800 mb-2 flex items-center gap-2';

                // タグがある場合は追加
                if (sectionData.tag) {
                    const tag = document.createElement('span');
                    tag.className = 'bg-gray-200 text-gray-700 text-[0.6rem] px-2 py-0.5 rounded-full';
                    tag.textContent = sectionData.tag;
                    title.appendChild(tag);
                }

                const titleText = document.createElement('span');
                titleText.textContent = sectionData.title;
                title.appendChild(titleText);

                section.appendChild(title);

                // セクションコンテンツのレンダリング
                renderSectionContent(section, sectionData);

                bodyContainer.appendChild(section);
            });
        }

        // セクションコンテンツのレンダリング
        function renderSectionContent(section, sectionData) {
            const content = sectionData.content;

            // 説明テキストがある場合
            if (content.description) {
                const description = document.createElement('p');
                description.className = 'text-xs text-gray-600 mb-3';
                description.textContent = content.description;
                section.appendChild(description);
            }

            // アイテムリストがある場合
            if (content.items) {
                // 市場トレンド概要セクションの場合
                if (sectionData.id === 'market-trends') {
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-2 gap-3';

                    content.items.forEach(item => {
                        const itemContainer = document.createElement('div');
                        itemContainer.className = 'bg-gray-50/90 p-3 rounded-xl border border-gray-100/70';

                        if (item.title) {
                            const title = document.createElement('div');
                            title.className = 'text-xs font-semibold text-gray-600';
                            title.textContent = item.title;
                            itemContainer.appendChild(title);

                            if (item.list) {
                                const list = document.createElement('ul');
                                list.className = 'list-disc list-inside text-xs text-gray-700 mt-1 space-y-1';

                                item.list.forEach(listItem => {
                                    const li = document.createElement('li');
                                    li.textContent = listItem;
                                    list.appendChild(li);
                                });

                                itemContainer.appendChild(list);
                            }
                        } else if (item.text) {
                            const text = document.createElement('p');
                            text.className = 'text-xs text-gray-600';
                            text.innerHTML = item.text;
                            itemContainer.appendChild(text);
                        }

                        grid.appendChild(itemContainer);
                    });

                    section.appendChild(grid);
                }
                // データ注記セクションの場合
                else if (sectionData.id === 'data-notes' || sectionData.id === 'glossary') {
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 gap-2 text-sm';

                    content.items.forEach(item => {
                        const itemContainer = document.createElement('div');
                        itemContainer.className = 'flex items-center gap-2 bg-white/50 p-2 rounded-xl';

                        const icon = document.createElement('span');
                        icon.className = 'text-indigo-400';
                        icon.textContent = item.icon;

                        const label = document.createElement('span');
                        label.className = 'font-semibold text-gray-700';
                        label.textContent = item.label + ' — ';

                        const description = document.createElement('span');
                        description.className = 'text-gray-600';
                        description.textContent = item.description;

                        itemContainer.appendChild(icon);
                        itemContainer.appendChild(label);
                        itemContainer.appendChild(description);

                        grid.appendChild(itemContainer);
                    });

                    section.appendChild(grid);
                }
                // プライバシー、運営情報、セキュリティセクションの場合
                else if (sectionData.id === 'privacy' || sectionData.id === 'operation-info' || sectionData.id === 'security') {
                    const list = document.createElement('ul');
                    list.className = 'text-xs space-y-1 mt-2 pl-2 list-disc list-inside text-gray-700';

                    content.items.forEach(item => {
                        const listItem = document.createElement('li');
                        listItem.innerHTML = `<span class="font-semibold">${item.label}</span> — ${item.description}`;
                        list.appendChild(listItem);
                    });

                    section.appendChild(list);
                }
                // AIの透明性セクションの場合
                else if (sectionData.id === 'ai-transparency') {
                    const list = document.createElement('ul');
                    list.className = 'space-y-1.5 text-xs text-indigo-900/80';

                    content.items.forEach(item => {
                        const listItem = document.createElement('li');
                        listItem.className = 'flex items-start gap-2';

                        const icon = document.createElement('span');
                        icon.className = 'text-indigo-500';
                        icon.textContent = item.icon;

                        const text = document.createElement('span');
                        text.textContent = item.text;

                        listItem.appendChild(icon);
                        listItem.appendChild(text);

                        list.appendChild(listItem);
                    });

                    section.appendChild(list);
                }
                // よくある質問セクションの場合
                else if (sectionData.id === 'faq') {
                    const faqContainer = document.createElement('div');
                    faqContainer.className = 'bg-neutral-50 p-3 rounded-xl';

                    content.items.forEach(item => {
                        const faqItem = document.createElement('div');
                        faqItem.className = 'mt-1 text-xs';

                        const question = document.createElement('div');
                        question.innerHTML = `<span class="font-semibold">${item.question}</span> — ${item.answer}`;

                        faqItem.appendChild(question);
                        faqContainer.appendChild(faqItem);
                    });

                    section.appendChild(faqContainer);

                    // 手順のレンダリング
                    if (content.steps) {
                        const stepsGrid = document.createElement('div');
                        stepsGrid.className = 'grid grid-cols-3 gap-2 text-center mt-3';

                        content.steps.forEach(step => {
                            const stepContainer = document.createElement('div');
                            stepContainer.className = 'bg-white p-2 rounded-lg shadow-sm border border-gray-100';

                            const number = document.createElement('div');
                            number.className = 'text-lg';
                            number.textContent = step.number;

                            const title = document.createElement('div');
                            title.className = 'text-[0.6rem] font-bold';
                            title.textContent = step.title;

                            const description = document.createElement('span');
                            description.className = 'text-[0.5rem] text-gray-400';
                            description.textContent = step.description;

                            stepContainer.appendChild(number);
                            stepContainer.appendChild(title);
                            stepContainer.appendChild(description);

                            stepsGrid.appendChild(stepContainer);
                        });

                        section.appendChild(stepsGrid);
                    }

                    // 情報のレンダリング
                    if (content.info) {
                        const infoContainer = document.createElement('div');
                        infoContainer.className = 'bg-gray-50 p-3 rounded-xl flex flex-wrap justify-between text-xs mt-3';

                        content.info.forEach(info => {
                            const infoItem = document.createElement('span');
                            infoItem.className = 'flex items-center gap-1';
                            infoItem.innerHTML = `<span class="text-indigo-400">${info.icon}</span> ${info.label}: ${info.value}`;

                            infoContainer.appendChild(infoItem);
                        });

                        section.appendChild(infoContainer);
                    }
                }
            }

            // インジケーターがある場合
            if (content.indicators) {
                const indicatorsContainer = document.createElement('div');
                indicatorsContainer.className = 'space-y-3';

                content.indicators.forEach(indicator => {
                    const indicatorItem = document.createElement('div');
                    indicatorItem.className = 'flex items-center justify-between';

                    const label = document.createElement('span');
                    label.className = 'text-sm text-gray-700';
                    label.textContent = indicator.label;

                    const value = document.createElement('span');
                    value.className = `${indicator.class} text-xs px-3 py-1 rounded-full`;
                    value.textContent = indicator.value;

                    indicatorItem.appendChild(label);
                    indicatorItem.appendChild(value);

                    indicatorsContainer.appendChild(indicatorItem);
                });

                section.appendChild(indicatorsContainer);
            }

            // タグがある場合
            if (content.tags) {
                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'bg-gray-100/50 p-3 rounded-xl flex flex-wrap gap-2 items-center';

                content.tags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'matrix-tag';
                    tagElement.textContent = `${tag.icon} ${tag.label}`;

                    tagsContainer.appendChild(tagElement);
                });

                section.appendChild(tagsContainer);
            }

            // 注記がある場合
            if (content.note) {
                const note = document.createElement('p');
                note.className = 'text-[0.65rem] text-gray-400 pt-1 border-t border-gray-100 mt-2';
                note.textContent = content.note;

                section.appendChild(note);
            }
        }

        // ナビゲーションのレンダリング
        function renderNavigation() {
            const navContainer = document.getElementById('__pillNav');

            window.__LAYOUT.sections.forEach(sectionId => {
                const sectionData = window.__COPY.sections.find(section => section.id === sectionId);
                if (!sectionData) return;

                const navItem = document.createElement('a');
                navItem.href = `#${sectionId}`;
                navItem.className = 'inline-block px-3 py-1 text-sm text-gray-600 hover:text-indigo-600 transition-colors';
                navItem.textContent = sectionData.title;

                navItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
                });

                navContainer.appendChild(navItem);
            });

            // スクロール時にナビゲーションを表示
            window.addEventListener('scroll', () => {
                if (window.scrollY > 100) {
                    navContainer.classList.remove('hidden');
                } else {
                    navContainer.classList.add('hidden');
                }
            });
        }

        // 目次のレンダリング
        function renderToc() {
            const tocContainer = document.getElementById('tocContent');

            window.__LAYOUT.sections.forEach(sectionId => {
                const sectionData = window.__COPY.sections.find(section => section.id === sectionId);
                if (!sectionData) return;

                const tocItem = document.createElement('a');
                tocItem.href = `#${sectionId}`;
                tocItem.className = 'block py-2 text-sm text-gray-700 hover:text-indigo-600 transition-colors';
                tocItem.textContent = sectionData.title;

                tocItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
                    document.getElementById('__toc').classList.add('hidden');
                });

                tocContainer.appendChild(tocItem);
            });
        }

        // フッターのレンダリング
        function renderFooter() {
            const bodyContainer = document.getElementById('__body');

            const separator = document.createElement('div');
            separator.className = 'separator-dash !mt-4';

            const footerText = document.createElement('div');
            footerText.className = 'text-[0.55rem] text-gray-400 text-center leading-relaxed pb-2';
            footerText.innerHTML = window.__COPY.footer.text + '<br>' + window.__COPY.footer.copyright;

            bodyContainer.appendChild(separator);
            bodyContainer.appendChild(footerText);
        }

        // Cookie機能の初期化
        function initCookie() {
            // Cookieが既に受け入れられているか確認
            if (!localStorage.getItem('cookieAccepted')) {
                // Cookieポップアップを表示
                setTimeout(() => {
                    document.getElementById('__cookie').classList.remove('hidden');
                }, 1000);
            }
        }

        // イベントリスナーの初期化
        function initEventListeners() {
            // Cookie受け入れボタン
            document.getElementById('acceptCookie').addEventListener('click', () => {
                localStorage.setItem('cookieAccepted', 'true');
                document.getElementById('__cookie').classList.add('hidden');
            });

            // Cookie拒否ボタン
            document.getElementById('rejectCookie').addEventListener('click', () => {
                localStorage.setItem('cookieAccepted', 'false');
                document.getElementById('__cookie').classList.add('hidden');
            });

            // 目次を開くボタン
            const tocButton = document.createElement('button');
            tocButton.className = 'fixed top-4 right-4 z-50 bg-white p-2 rounded-full shadow-md';
            tocButton.innerHTML = '<svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>';

            tocButton.addEventListener('click', () => {
                document.getElementById('__toc').classList.remove('hidden');
            });

            document.body.appendChild(tocButton);

            // 目次を閉じるボタン
            document.getElementById('closeToc').addEventListener('click', () => {
                document.getElementById('__toc').classList.add('hidden');
            });

            // 目次の背景をクリックして閉じる
            document.getElementById('__toc').addEventListener('click', (e) => {
                if (e.target.id === '__toc') {
                    document.getElementById('__toc').classList.add('hidden');
                }
            });

            // CTAボタンのクリックイベント
            function handleCtaClick(event) {
                event.preventDefault();
                // /contact ページにリダイレクト
                window.location.href = '/contact';
            }

            document.getElementById('mainCta').addEventListener('click', handleCtaClick);
        }

        // ページ読み込み時に初期化関数を実行
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
